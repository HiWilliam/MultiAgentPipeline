# dual-cli-pipeline 配置样例 (MVP 子集)
# 对应 docs/2026-06-30-dual-cli-pipeline-design.md §6
# MVP 关闭的开关已显式标注;第二里程碑再开

project:
  name: agent-pipeline
  root: /wuhao/workspace/agent-pipeline/

clis:
  claude:
    cmd: "claude"
  codex:
    cmd: "codex"

# 相对 project.root
artifacts_dir: pipeline/artifacts
state_file: pipeline/state.json

max_iterations: 5
pass_marker: "STATUS: PASS"

# observe_mode: agent 输出的观察模式
#   plain - pipeline 直接 spawn agent, 前台流式输出, 无 tmux 依赖 (默认, 向后兼容)
#   tmux  - 在独立 tmux session 里跑 agent, 用户 attach 观察, 可 pane 内 Ctrl-C 中止
observe_mode: tmux

# 阶段 3a 自测门 (MVP 关)
self_test_gate: false
selftest_max_fixes: 3

# 收敛监测 (MVP 关;字段保留为后续开接口)
stall_detection:
  same_category_repeat: 2
  issue_count_not_decreasing: false
